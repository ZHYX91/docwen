<svg viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- 红色外框（带圆角） -->
  <!-- x="100" y="100": 从坐标(100,100)开始绘制 -->
  <!-- width="1000" height="1000": 宽度1000单位，高度1000单位 -->
  <!-- rx="100": 圆角半径为100单位 -->
  <rect x="100" y="100" width="1000" height="1000" rx="100" fill="red"/>
  
  <!-- 白色内页（45度折角） -->
  <!-- 路径命令详解： -->
  <!-- M150 150: 移动到坐标(150,150) -->
  <!-- H 950: 水平向右画线到x=950的位置 -->
  <!-- L 1050 323.2: 画直线到坐标(1050,323.2)，形成折角 -->
  <!-- V 1050: 垂直向下画线到y=1050的位置 -->
  <!-- H 150: 水平向左画线到x=150的位置 -->
  <!-- Z: 闭合路径，回到起点(150,150) -->
  <path d="M150 150 H 950 L 1050 323.2 V 1050 H 150 Z" fill="white"/>
  
  <!-- 折角部分（阴影效果） -->
  <!-- 路径命令详解： -->
  <!-- M950 150: 移动到坐标(950,150) -->
  <!-- L 1050 323.2: 画直线到坐标(1050,323.2) -->
  <!-- L 900 236.6: 画直线到坐标(900,236.6) -->
  <!-- Z: 闭合路径，形成三角形折角阴影 -->
  <path d="M950 150 L 1050 323.2 L 900 236.6 Z" fill="#dddddd" />
  
  <!-- 居中加粗的标题 -->
  <!-- x1="400" y1="300": 起点坐标(400,300) -->
  <!-- x2="750" y2="300": 终点坐标(750,300)，水平线 -->
  <!-- stroke-width="75": 线条宽度75单位，比正文粗 -->
  <line x1="400" y1="300" x2="750" y2="300" stroke="red" stroke-width="75"/>
  
  <!-- 正文第一行 -->
  <!-- x1="250" y1="525": 起点坐标(250,525) -->
  <!-- x2="900" y2="525": 终点坐标(900,525)，水平线 -->
  <line x1="250" y1="525" x2="900" y2="525" stroke="red" stroke-width="50"/>
  
  <!-- 正文第二行 -->
  <!-- x1="250" y1="725": 起点坐标(250,725) -->
  <!-- x2="900" y2="725": 终点坐标(900,725)，水平线 -->
  <line x1="250" y1="725" x2="900" y2="725" stroke="red" stroke-width="50"/>
  
  <!-- 右对齐的落款 -->
  <!-- x1="700" y1="925": 起点坐标(700,925)，靠右开始 -->
  <!-- x2="900" y2="925": 终点坐标(900,925)，短水平线 -->
  <line x1="700" y1="925" x2="900" y2="925" stroke="red" stroke-width="50"/>
</svg>
