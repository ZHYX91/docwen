# ==================================
#  输出配置
# ==================================

# ==================================
#  输出目录配置
# ==================================
[directory]
# 输出文件保存位置策略
# 可选值：
#   "source" - 保存到原文件所在文件夹
#   "custom" - 保存到用户指定的文件夹
mode = "source"

# 当 mode = "custom" 时，指定自定义输出文件夹路径
# 支持绝对路径或相对路径
# 相对路径相对于当前工作目录
# 留空则使用原文件所在文件夹
custom_path = ""

# 是否在输出目录下创建子文件夹
# true:  S:\输出\2025-01-06\报表.pdf
# false: S:\输出\报表.pdf
create_date_subfolder = false

# 子文件夹命名格式
# 支持的格式：
#   "%Y-%m-%d"      → 2025-01-06
#   "%Y%m%d"        → 20250106
#   "%Y年%m月%d日"  → 2025年01月06日
date_folder_format = "%Y-%m-%d"


# ==================================
#  输出行为配置
# ==================================
[behavior]
# 是否在转换或校对成功后自动打开输出文件夹并选中最终文件
auto_open_folder = false


# ==================================
#  中间文件保存配置
# ==================================
[intermediate_files]
# 是否保存转换链中的中间文件到目标文件夹
# true:  多步转换时，保存所有中间步骤文件（如 xls→xlsx→ods，会保存xlsx中间文件）
# false: 只保存最终结果文件（如 xls→xlsx→ods，只保存ods最终文件）
# 
# 说明：
# - 中间文件指有明确命名规则的文件（如"报表_fromXls_20250106.xlsx"）
# - 临时工作目录中的文件无论如何都会被自动删除
# - 此选项不影响临时目录的自动清理
save_to_output = false

[manifest]
# 是否在输出目录生成 manifest.json（用于排障/追踪一次转换的输入、预处理链路与中间产物）
# - true:  在输出目录写入 manifest.json；失败时写 manifest_failed_*.json
# - false: 不写入（默认，避免影响用户目录）
#
# manifest 可能包含本机路径信息；若担心泄露，请保持 mask_input_path = true
save_to_output = false
# 是否对输入路径脱敏
# - true:  input.path 只保留文件名（形如 <redacted>/<filename>）
# - false: 写入完整输入路径（不推荐）
mask_input_path = true
