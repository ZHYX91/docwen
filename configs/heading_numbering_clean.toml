# 序号清理规则配置文件
# 用于 DOCX/PDF 转 MD 时清理原文档中的标题序号

# ============================================
# 占位符说明
# ============================================
# 占位符由代码定义（heading_utils.py），此文件只配置规则
# 可用的占位符：
#   {space}        - 空白字符（空格、全角空格等）
#   {sep}          - 分隔符（点号、顿号、逗号等）
#   {bracket_open} - 左括号（中英文）
#   {bracket_close}- 右括号（中英文）
#   {num_arab}     - 阿拉伯数字（半角+全角）
#   {num_cn}       - 中文数字（小写+大写+零+㈠-㈩）
#   {num_cn_paren} - 带括号中文数字（㈠-㈩）
#   {num}          - 所有数字（中文+阿拉伯+㈠-㈩）
#   {letter}       - 拉丁字母（大小写）
#   {circled}      - 带圈数字（①-㊿、❶-⓴、⓵-⓾、⓪⓿、㈠-㈩）
#   {circled_solid}- 实心带圈数字（❶-⓴）
#   {circled_double}- 双圈数字（⓵-⓾）
#   {unit_suffix}  - 中文单位后缀词（章节条款等）
#   {unit_prefix}  - 中文单位前缀词（卷篇册等）

# ============================================
# 全局设置
# ============================================
[settings]
# 规则执行顺序（按数组顺序依次尝试，首个匹配成功的规则生效后立即返回）
order = [
    "chinese_unit_suffix",
    "chinese_unit_prefix",
    "circled_numbers",
    "bracket_number",
    "hierarchical",
    "number_separator",
    "legal_english",
    "letter_number",
]

# ============================================
# 系统预设规则（不可删除，可禁用）
# ============================================

# --------------------------------------------
# 规则1：中文【第X单位】格式（单位后缀）
# --------------------------------------------
[rules.chinese_unit_suffix]
name = "中文【第X单位】格式"
description = "匹配：第X回/篇/册/卷/部/集/期/编/章/节/条/款/项/目 + 空格（支持内部空格）"
enabled = true
is_system = true
regex = "^{space}*第{space}*{num}+{space}*{unit_suffix}{space}+"
examples = [
    "第一章　基本规定",
    "第壹编 总则",
    "第12条 犯罪构成",
    "第１２节 量刑标准",
    "第一百零一条 附则",
    "第三回 风起云涌",
    "第 一 章 带空格格式",
    "第 12 条 带空格数字",
]

# --------------------------------------------
# 规则2：中文【单位X】格式（单位前缀）
# --------------------------------------------
[rules.chinese_unit_prefix]
name = "中文【单位X】格式"
description = "匹配：卷/篇/册/部/集/期/编/章/节/回 + 数字 + 空格（支持内部空格）"
enabled = true
is_system = true
regex = "^{space}*{unit_prefix}{space}*{num}+{space}+"
examples = [
    "卷一 前言",
    "卷1 内容",
    "篇三 主体部分",
    "章五 结论",
    "卷 一 带空格格式",
    "回 12 带空格数字",
]

# --------------------------------------------
# 规则3：带圈数字
# --------------------------------------------
[rules.circled_numbers]
name = "带圈数字"
description = "匹配：①-㊿、❶-⓴、⓵-⓾、㈠-㈩ 等带圈/特殊数字 + 可选分隔符"
enabled = true
is_system = true
regex = "^{space}*{circled}{sep}?{space}*"
examples = [
    "① 内容",
    "②.内容",
    "③、内容",
    "⑩ 第十项",
    "❶ 实心数字",
    "⓵ 双圈数字",
    "㊿ 第五十项",
    "㈠ 带括号中文数字",
]

# --------------------------------------------
# 规则4：括号数字（阿拉伯+中文合并，支持前括号可选）
# --------------------------------------------
[rules.bracket_number]
name = "括号数字"
description = "匹配：(1)、（一）、1)、一）等 + 可选分隔符"
enabled = true
is_system = true
regex = "^{space}*{bracket_open}?{num}+{bracket_close}{sep}?{space}*"
examples = [
    "(1) 内容",
    "（2）内容",
    "1) 内容",
    "2）内容",
    "（一）内容",
    "(二)内容",
    "一）内容",
    "十一）、内容",
]

# --------------------------------------------
# 规则5：层级数字
# --------------------------------------------
[rules.hierarchical]
name = "层级数字"
description = "匹配：1.1 / 1.1.1 / 1.1.1.1 等 + 可选分隔符 + 空格"
enabled = true
is_system = true
regex = "^{space}*{num_arab}+(?:\\.{num_arab}+)+{sep}?{space}+"
examples = [
    "1.1 内容",
    "2.3.4 内容",
    "1.2.3.4.5 多级内容",
    "1.1. 带尾点",
]

# --------------------------------------------
# 规则6：数字/中文 + 分隔符（合并）
# --------------------------------------------
[rules.number_separator]
name = "数字分隔符"
description = "匹配：1. / 2、/ 一、/ 二，等 + 可选空格"
enabled = true
is_system = true
regex = "^{space}*{num}+{sep}{space}*"
examples = [
    "1. 内容",
    "2．内容",
    "3、内容",
    "一、内容",
    "十二、内容",
    "壹、内容",
    "１２. 内容",
]

# ============================================
# 扩展规则（默认禁用）
# ============================================

# --------------------------------------------
# 规则7：英文章节格式
# --------------------------------------------
[rules.legal_english]
name = "英文章节格式"
description = "匹配：Chapter/Part/Volume/Book/Section + 数字/罗马数字"
enabled = false
is_system = true
regex = "^{space}*(?:Chapter|Part|Volume|Book|Section)\\s+[0-9IVXLCDMivxlcdm]+[\\s\\.:\\-]+"
examples = [
    "Chapter 1 Introduction",
    "Part III. Penalties",
    "Section 2.1 Overview",
    "Volume IV: Appendix",
]

# --------------------------------------------
# 规则8：字母序号
# --------------------------------------------
[rules.letter_number]
name = "字母序号"
description = "匹配：A. / A) / (A) / a. / a) 等（需有分隔符，避免误匹配）"
enabled = false
is_system = true
regex = "^{space}*(?:{bracket_open}{letter}{bracket_close}|{letter}{bracket_close}|{letter}{sep}){space}*"
examples = [
    "A. 内容",
    "A) 内容",
    "(A) 内容",
    "a. 内容",
    "a) 内容",
    "B、内容",
]

# ============================================
# 使用说明
# ============================================
# 1. {placeholder} 格式的占位符会被替换为代码中定义的字符集
# 2. 规则按 order 数组顺序执行，首个匹配成功即返回
# 3. enabled = false 的规则会被跳过
# 4. is_system = true 的规则不可删除，只能禁用
# 5. 可以添加自定义规则，格式同上
# 6. 正则表达式使用 Python re 模块语法
