# ==============================================================================
# 代码样式配置
# 定义代码样式的识别规则和输出样式
#
# 样式名数据源说明：
# - 我们定义的样式名（如"代码块"/"Code Block"）存储在语言文件中
# - 本文件只存储第三方软件（Word/WPS）内置的样式名别名，用于检测
# ==============================================================================

# ------------------------------------------------------------------------------
#  DOCX → MD 代码识别
# ------------------------------------------------------------------------------
[docx_to_md]
# 第三方段落样式别名（仅用于检测，不用于注入）
# 整段为代码时转为代码块
paragraph_style_aliases = [
    # Word/WPS 内置样式
    "HTML Preformatted",
]

# 第三方字符样式别名（仅用于检测，不用于注入）
# 部分文本为代码时转为行内代码
character_style_aliases = [
    # Word/WPS 内置 HTML 样式
    "HTML Code",
    "HTML Typewriter",
    "HTML Keyboard",
    "HTML Sample",
    "HTML Variable",
    "HTML Definition",
    "HTML Cite",
    "HTML Address",
    "HTML Acronym",
    # 其他第三方样式
    "Code",
    "Source Code",
    "源代码",
    "源码",
]

# 整段检测：如果段落中所有run都是字符级代码样式，则视为代码块
# 否则按行内代码处理
full_paragraph_as_block = true

# 模糊匹配开关
fuzzy_match_enabled = true

# 模糊匹配关键词（不区分大小写）
fuzzy_keywords = ["code", "代码", "源码"]

# ------------------------------------------------------------------------------
#  底纹识别配置（仅 DOCX → MD 方向使用）
#  WPS 和 Word 的字符底纹实现方式不同：
#  - WPS：纯色填充（w:val="clear" + w:fill="D9D9D9"），颜色硬编码在代码中
#  - Word：图案填充（w:val="pct15" + w:fill="FFFFFF"），图案类型硬编码在代码中
# ------------------------------------------------------------------------------
[docx_to_md.shading]
# WPS 字符底纹识别
wps_enabled = true

# Word 字符底纹识别
word_enabled = true

# ------------------------------------------------------------------------------
#  MD → DOCX 代码输出
#  样式键名对应语言文件中的 [styles] 节
# ------------------------------------------------------------------------------
[md_to_docx]
# 行内代码 `code` 使用的样式键名
inline_code_style_key = "inline_code"

# 代码块 ```code``` 使用的样式键名
code_block_style_key = "code_block"
