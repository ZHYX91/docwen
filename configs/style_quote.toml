# ==============================================================================
# 引用样式配置
# 定义引用样式的识别规则和输出样式
# 支持分级引用：引用 1~9 对应 Markdown 的 > >> >>> ...
#
# 样式名数据源说明：
# - 我们定义的样式名（如"引用 1"/"Quote 1"）存储在语言文件中
# - 本文件只存储第三方软件（Word/WPS）内置的样式名别名，用于检测
# ==============================================================================

# ------------------------------------------------------------------------------
#  DOCX → MD 引用识别
# ------------------------------------------------------------------------------
[docx_to_md]
# 第三方分级样式别名映射（仅用于检测）
# 格式: { "第三方样式名" = 级别 }
# 用于识别 Word/WPS 内置样式的引用级别
level_style_aliases = { }

# 第三方通用引用样式别名（仅用于检测，无法确定级别时默认为1级）
paragraph_style_aliases = [
    # Word 内置引用样式（视为1级引用）
    "Quote",
    "Block Text",
    "Intense Quote",
    # 中文别名
    "引用",
    "明显引用",
]

# 第三方字符样式别名（仅用于检测）
character_style_aliases = [
    "Quote Char",
    "引用字符",
]

# 整段检测：如果段落中所有run都是字符级引用样式，则视为引用块
# 否则按行内代码处理
full_paragraph_as_block = true

# 模糊匹配开关
fuzzy_match_enabled = true

# 模糊匹配关键词（不区分大小写）
fuzzy_keywords = ["quote", "引用"]

# ------------------------------------------------------------------------------
#  MD → DOCX 引用输出
#  将 Markdown 引用转换为分级引用样式
#  > 对应 quote_1, >> 对应 quote_2, 以此类推（最高支持9级）
#  样式键名对应语言文件中的 [styles] 节
# ------------------------------------------------------------------------------
[md_to_docx]
# 分级引用样式键名映射
# Markdown > 数量对应的样式键名
level_1_style_key = "quote_1"
level_2_style_key = "quote_2"
level_3_style_key = "quote_3"
level_4_style_key = "quote_4"
level_5_style_key = "quote_5"
level_6_style_key = "quote_6"
level_7_style_key = "quote_7"
level_8_style_key = "quote_8"
level_9_style_key = "quote_9"
