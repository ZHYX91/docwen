# ==============================================================================
# 公文校对配置 - 敏感词映射表
# 开关设置请在 proofread_config.toml 中配置
# ==============================================================================

# 敏感词及排除项映射表
# 格式："敏感词" = ["例外情况1", "例外情况2"]
# 当检测到 "敏感词" 时，如果其所在的上下文不包含任何 "例外情况"，则报告错误。
[sensitive_words]

# 公文中需要特别注意的表述

# 容易混淆的专业术语
"禁止" = ["明令禁止", "禁止事项"] # 公文中应使用"不得"而非"禁止"
"绝对" = ["绝对值", "绝对优势"] # 公文应避免绝对化表述
"终止" = ["合同终止", "程序终止", "协议终止"] # 注意与"中止"区分
"秘密" = ["商业秘密"]
"机密" = ["商业机密"]
