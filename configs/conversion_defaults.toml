# ==================================
#  公文转换器 - 转换默认值配置
#  控制 GUI 界面的默认值设置
# ==================================

# ==================================
#  文档文件默认设置
# ==================================
[document]
# 转MD时的默认设置
to_md_keep_images = true       # 默认勾选"提取图片"
to_md_enable_ocr = false       # 默认勾选"图片文字识别"

# 转MD时的序号设置
to_md_remove_numbering = true             # 默认清除文档中的原序号
to_md_add_numbering = false               # 默认不添加新序号到Markdown
to_md_default_scheme = "gongwen_standard" # 默认使用的序号方案（引用heading_numbering_add.toml中的方案）

# 转MD时的优化设置
to_md_enable_optimization = false          # 默认启用针对文档类型优化
to_md_optimization_type = "公文"           # 默认优化类型（公文/合同/论文）

# 校对默认设置
enable_symbol_pairing = true   # 启用标点配对检查
enable_symbol_correction = true # 启用符号校对
enable_typos_rule = true       # 启用错别字校对
enable_sensitive_word = true   # 启用敏感词匹配

# ==================================
#  表格文件默认设置
# ==================================
[spreadsheet]
# 转MD时的默认设置
to_md_keep_images = true       # 默认勾选"提取图片"
to_md_enable_ocr = false       # 默认勾选"图片文字识别"

# 汇总默认设置
merge_mode = 3                 # 汇总模式: 1=按行, 2=按列, 3=按单元格

# ==================================
#  图片文件默认设置
# ==================================
[image]
# 转MD时的默认设置
to_md_keep_images = true       # 默认勾选"提取图片"
to_md_enable_ocr = true        # 默认勾选"图片文字识别"

# 压缩选项默认设置
compress_mode = "lossless"     # 压缩模式: lossless/limit_size
size_limit = 200               # 大小限制（当compress_mode=limit_size时）
size_unit = "KB"               # 单位: KB/MB

# PDF选项默认设置
pdf_quality = "original"       # PDF尺寸: original/a4/a3

# TIFF选项默认设置
tiff_mode = "smart"            # TIFF模式: smart/RGB

# ==================================
#  版式文件默认设置
# ==================================
[layout]
# 转MD时的默认设置
to_md_keep_images = true       # 默认勾选"提取图片"
to_md_enable_ocr = false       # 默认勾选"图片文字识别"

# 渲染选项默认设置
render_dpi = 300               # 渲染DPI: 150/300/600

# ==================================
#  文本文件默认设置
# ==================================
[text]
# MD转DOCX序号设置
to_docx_remove_numbering = true             # 默认清除MD中的原序号
to_docx_add_numbering = true                # 默认添加新序号到DOCX
to_docx_default_scheme = "gongwen_standard" # 默认使用的序号方案（引用heading_numbering.toml中的方案）

# MD转XLSX序号设置（预留）
to_xlsx_remove_numbering = true
to_xlsx_add_numbering = false
to_xlsx_default_scheme = "hierarchical_standard"
