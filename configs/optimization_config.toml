# 文档优化类型配置文件
# 定义文档转MD时的优化类型选项
#
# ============================================
# 国际化说明
# ============================================
# locales: 指定优化类型适用的语言
#   - ["zh_CN"]: 仅在中文界面显示
#   - ["*"]: 在所有语言界面显示
#
# name vs name_key:
#   - name: 直接存储显示名称（用于语言专属选项，无需翻译）
#   - name_key: 翻译键，从 i18n 文件获取名称（用于通用选项，需要多语言翻译）

# ============================================
# 全局设置
# ============================================
[settings]
# 默认优化类型
default_type = "gongwen"

# 优化类型显示顺序
order = ["gongwen"]

# ============================================
# 优化类型定义
# ============================================

# --------------------------------------------
# 类型1：公文优化
# --------------------------------------------
[types.gongwen]
name = "公文"
description = "针对中国公文格式进行优化处理，包括标题识别、序号处理、红头文件解析等"
locales = ["zh_CN"]
enabled = true
is_system = true

# ============================================
# 使用说明
# ============================================
# 1. 修改 default_type 可更改默认优化类型
# 2. 在 order 数组中调整显示顺序
# 3. 添加新的优化类型：
#    [types.新类型ID]
#    name = "显示名称"           # 语言专属选项用 name
#    name_key = "翻译键"         # 通用选项用 name_key
#    description = "类型描述"
#    locales = ["zh_CN"]        # 适用语言
#    enabled = true
#    is_system = false          # 用户自定义为 false
#
# 4. locales 支持的格式：
#    - ["zh_CN"]: 仅中文界面显示
#    - ["*"]: 所有语言界面显示
#    - ["zh_CN", "en_US"]: 中文和英文界面显示
