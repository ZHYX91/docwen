# ==============================================================================
# 公文校对配置 - 符号配置
# 开关设置请在 proofread_config.toml 中配置
# ==============================================================================

# 符号配对检查配置
[symbol_pairing]
# 需要检查的符号对
pairs = [
    ["(", ")"],
    ["（", "）"],
    ["[", "]"],
    ["【", "】"],
    ["{", "}"],
    ["「", "」"],
    ["'", "'"],
    ["\"", "\""],
    ["‘", "’"],
    ["“", "”"],
    ["《", "》"]
]

# 标点符号映射表
# 格式："正确符号" = ["错误符号1", "错误符号2"]
[symbol_map]
0 = ["０"]
1 = ["１"]
2 = ["２"]
3 = ["３"]
4 = ["４"]
5 = ["５"]
6 = ["６"]
7 = ["７"]
8 = ["８"]
9 = ["９"]
