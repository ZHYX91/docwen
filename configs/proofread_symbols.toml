# ==============================================================================
# 公文校对配置 - 符号配置
# 开关设置请在 proofread_config.toml 中配置
# ==============================================================================

# 符号配对检查配置
[symbol_pairing]
# 需要检查的符号对
pairs = [
    ["(", ")"],
    ["（", "）"],
    ["[", "]"],
    ["【", "】"],
    ["{", "}"],
    ["「", "」"],
    ["'", "'"],
    ["\"", "\""],
    ["'", "'"],
    [""", """],
    ["《", "》"]
]

# 标点符号映射表
# 格式："正确符号" = ["错误符号1", "错误符号2"]
[symbol_map]
"，" = [","] # 英文逗号
"：" = [":"] # 英文冒号
"；" = [";"] # 英文分号
"！" = ["!"] # 英文感叹号
"？" = ["?"] # 英文问号
"（" = ["("]
"）" = [")"]
"“" = ["\""]
"‘" = ["'"]
"《" = ["<"]
"》" = [">"]
"〔" = ["【", "[", "{", "「"]
"〕" = ["】", "]", "}", "」"]
0 = ["０"] # 全角数字
1 = ["１"] # 全角数字
2 = ["２"] # 全角数字
3 = ["３"] # 全角数字
4 = ["４"] # 全角数字
5 = ["５"]
6 = ["６"]
7 = ["７"]
8 = ["８"]
9 = ["９"]
