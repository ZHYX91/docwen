# ==============================================================================
# 表格样式配置
# 定义表格样式的输出样式
#
# 样式名数据源说明：
# - 我们定义的样式名（如"三线表"/"Three Line Table"）存储在语言文件中
# - 本文件只存储样式键名引用和功能配置
# ==============================================================================

# ------------------------------------------------------------------------------
#  MD → DOCX 表格输出
#  样式键名对应语言文件中的 [styles] 节
# ------------------------------------------------------------------------------
[md_to_docx]
# 表格样式模式: "builtin" 使用内置样式, "custom" 使用自定义样式名
table_style_mode = "builtin"

# 内置样式键名: "three_line_table" (三线表) 或 "table_grid" (网格表)
# 内置样式会自动检测模板是否存在，不存在则注入
builtin_style_key = "three_line_table"

# 自定义样式名称（当 table_style_mode = "custom" 时使用）
# 如果模板中不存在此样式，会创建一个网格表格式的同名样式
custom_style_name = ""

# 表格内容（单元格段落）使用的样式键名
table_content_style_key = "table_content"
