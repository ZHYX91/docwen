# 公文校对配置 - 错别字部分

# 校对引擎开关
[engine_settings]
enable_typos_rule = true   # 是否启用错别字校对

# 错别字映射表
[typos]
"密级" = ["秘级", "秘急"]
"保密期限" = ["保秘期限", "保密时间"]
"紧急程度" = ["紧急程序", "紧急级别"]
"发文字号" = ["发文编号", "文件字号"]
"主送机关" = ["主送单位", "主送机构"]
"附件" = ["付件"]
"发文机关署名" = ["发文单位署名", "发文机构署名"]
"印发机关" = ["印刷单位", "印发单位"]
"抄送机关" = ["抄报单位", "抄送单位"]
"应当" = ["因当"]
