# ==============================================================================
# 公式样式配置
# 定义公式样式的输出样式
#
# 样式名数据源说明：
# - 我们定义的样式名（如"公式块"/"Formula Block"）存储在语言文件中
# - 本文件只存储样式键名引用和功能配置
# ==============================================================================

# ------------------------------------------------------------------------------
#  MD → DOCX 公式输出
#  样式键名对应语言文件中的 [styles] 节
# ------------------------------------------------------------------------------
[md_to_docx]
# 行内公式 $...$ 使用的样式键名（字符样式）
inline_formula_style_key = "inline_formula"

# 公式块 $$...$$ 使用的样式键名（段落样式）
formula_block_style_key = "formula_block"
