# 公文校对配置 - 符号部分

# 校对引擎开关
[engine_settings]
enable_symbol_pairing = true # 是否启用标点配对
enable_symbol_correction = true # 是否启用符号校对

# 符号配对检查配置
[symbol_pairing]
# 需要检查的符号对
pairs = [
    ["(", ")"],
    ["（", "）"],
    ["[", "]"],
    ["【", "】"],
    ["{", "}"],
    ["「", "」"],
    ["'", "'"],
    ["\"", "\""],
    ["‘", "’"],
    ["“", "”"],
    ["《", "》"]
]

# 标点符号映射表
[symbol_map]
"，" = [","] # 英文逗号
"：" = [":"] # 英文冒号
"；" = [";"] # 英文分号
"！" = ["!"]
"？" = ["?"]
"（" = ["("]
"）" = [")"]
"“" = ["\""]
"‘" = ["'"]
"《" = ["<"]
"》" = [">"]
"〔" = ["【", "[", "{"]
"〕" = ["】", "]", "}"]
0 = ["０"]
1 = ["１"]
2 = ["２"]
3 = ["３"]
4 = ["４"]
5 = ["５"]
6 = ["６"]
7 = ["７"]
8 = ["８"]
9 = ["９"]
