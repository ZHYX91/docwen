# =============================================================================
# 스타일 형식(스타일 주입 시 사용하는 서식 속성)
# =============================================================================
[style_formats]

# 본문 단락 서식(Malgun Gothic/Times New Roman, 11pt, 양쪽 정렬)
[style_formats.body_paragraph]
east_asia_font = "Malgun Gothic"
ascii_font = "Times New Roman"
font_size_pt = 11
first_line_indent_chars = 0
first_line_indent_cm = 0
spacing_after_twip = 120
spacing_before_twip = 0
bold = false
justification = "both"

# 제목 1 서식(Malgun Gothic, 16pt, 굵게, 왼쪽 정렬)
[style_formats.heading_1]
east_asia_font = "Malgun Gothic"
ascii_font = "Malgun Gothic"
font_size_pt = 16
first_line_indent_chars = 0
first_line_indent_cm = 0
spacing_after_twip = 120
spacing_before_twip = 240
bold = true
justification = "left"

# 제목 2 서식(Malgun Gothic, 14pt, 굵게, 왼쪽 정렬)
[style_formats.heading_2]
east_asia_font = "Malgun Gothic"
ascii_font = "Malgun Gothic"
font_size_pt = 14
first_line_indent_chars = 0
first_line_indent_cm = 0
spacing_after_twip = 120
spacing_before_twip = 240
bold = true
justification = "left"

# 제목 3-9 서식(Malgun Gothic, 12pt, 굵게, 왼쪽 정렬)
[style_formats.heading_3_9]
east_asia_font = "Malgun Gothic"
ascii_font = "Malgun Gothic"
font_size_pt = 12
first_line_indent_chars = 0
first_line_indent_cm = 0
spacing_after_twip = 120
spacing_before_twip = 240
bold = true
justification = "left"

# =============================================================================
# 플레이스홀더(문서 템플릿용)
# 이 플레이스홀더는 MD → DOCX 변환 시 템플릿 채우기에 사용됩니다
# =============================================================================
[placeholders]
