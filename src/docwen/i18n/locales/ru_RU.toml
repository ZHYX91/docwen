# =============================================================================
# Конфигурации формата стилей (для свойств форматирования при инъекции стилей)
# ГОСТ (RU): 14pt, отступ 1.25cm, выравнивание по ширине
# =============================================================================
[style_formats]

# Формат основного абзаца (Times New Roman, 14pt, отступ 1.25cm, выравнивание по ширине)
[style_formats.body_paragraph]
east_asia_font = "SimSun"
ascii_font = "Times New Roman"
font_size_pt = 14
first_line_indent_chars = 0
first_line_indent_cm = 1.25
spacing_after_twip = 0
spacing_before_twip = 0
bold = false
justification = "both"

# Формат заголовка 1 (Arial, 14pt, жирный, отступ 1.25cm, выравнивание по ширине)
[style_formats.heading_1]
east_asia_font = "SimSun"
ascii_font = "Arial"
font_size_pt = 14
first_line_indent_chars = 0
first_line_indent_cm = 1.25
spacing_after_twip = 0
spacing_before_twip = 0
bold = true
justification = "both"

# Формат заголовка 2 (Arial, 14pt, жирный, отступ 1.25cm, выравнивание по ширине)
[style_formats.heading_2]
east_asia_font = "SimSun"
ascii_font = "Arial"
font_size_pt = 14
first_line_indent_chars = 0
first_line_indent_cm = 1.25
spacing_after_twip = 0
spacing_before_twip = 0
bold = true
justification = "both"

# Формат заголовка 3-9 (Arial, 14pt, жирный, отступ 1.25cm, выравнивание по ширине)
[style_formats.heading_3_9]
east_asia_font = "SimSun"
ascii_font = "Arial"
font_size_pt = 14
first_line_indent_chars = 0
first_line_indent_cm = 1.25
spacing_after_twip = 0
spacing_before_twip = 0
bold = true
justification = "both"

