# =============================================================================
# Estilos (para conversión de documentos)
# Estos nombres de estilo se usan para inyección/detección en la conversión MD ↔ DOCX
# =============================================================================
[styles]
# Estilos de párrafo
body_paragraph = "Párrafo del cuerpo"
image_paragraph = "Párrafo de imagen"

# Estilos de código
code_block = "Bloque de código"
inline_code = "Código en línea"

# Estilos de fórmula
formula_block = "Bloque de fórmula"
inline_formula = "Fórmula en línea"

# Estilos de lista
list_block = "Bloque de lista"

# Estilos de línea horizontal
horizontal_rule_1 = "Línea horizontal 1"
horizontal_rule_2 = "Línea horizontal 2"
horizontal_rule_3 = "Línea horizontal 3"

# Estilos de tabla
table_content = "Contenido de tabla"
three_line_table = "Tabla de tres líneas"
table_grid = "Tabla de cuadrícula"

# Estilos de cita (9 niveles)
