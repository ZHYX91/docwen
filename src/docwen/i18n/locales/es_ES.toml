quote_2 = "Cita 2"
quote_3 = "Cita 3"
quote_4 = "Cita 4"
quote_5 = "Cita 5"
quote_6 = "Cita 6"
quote_7 = "Cita 7"
quote_8 = "Cita 8"
quote_9 = "Cita 9"
# =============================================================================
# Formatos de estilo (propiedades de formato para la inyección de estilos)
# =============================================================================
[style_formats]

# Formato de párrafo del cuerpo (SimSun/Times New Roman, 12pt, alineado a la izquierda)
[style_formats.body_paragraph]
east_asia_font = "SimSun"
ascii_font = "Times New Roman"
font_size_pt = 12
first_line_indent_chars = 0
first_line_indent_cm = 0
spacing_after_twip = 120
spacing_before_twip = 0
bold = false
justification = "left"

# Formato de título 1 (SimSun/Arial, 16pt, negrita, alineado a la izquierda)
[style_formats.heading_1]
east_asia_font = "SimSun"
ascii_font = "Arial"
font_size_pt = 16
first_line_indent_chars = 0
first_line_indent_cm = 0
spacing_after_twip = 120
spacing_before_twip = 240
bold = true
justification = "left"

# Formato de título 2 (SimSun/Arial, 14pt, negrita, alineado a la izquierda)
[style_formats.heading_2]
east_asia_font = "SimSun"
ascii_font = "Arial"
font_size_pt = 14
first_line_indent_chars = 0
first_line_indent_cm = 0
spacing_after_twip = 120
spacing_before_twip = 240
bold = true
justification = "left"

# Formato de título 3-9 (SimSun/Arial, 12pt, negrita, alineado a la izquierda)
[style_formats.heading_3_9]
east_asia_font = "SimSun"
ascii_font = "Arial"
font_size_pt = 12
first_line_indent_chars = 0
first_line_indent_cm = 0
spacing_after_twip = 120
spacing_before_twip = 240
bold = true
justification = "left"

# =============================================================================
# Marcadores de posición (para plantillas de documentos)
# Estos marcadores de posición se usan para rellenar plantillas en la conversión MD → DOCX
# =============================================================================
[placeholders]
title = "título"
body = "cuerpo"

# =============================================================================
# Claves YAML (para metadatos)
# Estas claves se usan para la salida de YAML front matter en la conversión DOCX → MD
# =============================================================================
[yaml_keys]
title = "título"
subtitle = "subtítulo"
