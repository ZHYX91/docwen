name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[lint]"
      - name: Ruff format (check)
        run: |
          ruff format --check .
      - name: Ruff check
        run: |
          ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[lint]"
      - name: Pyright
        run: |
          pyright --level error

  pytest_windows_pr:
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[test]"
      - name: Clean build artifacts
        run: python -c "import shutil, pathlib; [shutil.rmtree(p) for p in pathlib.Path('src').rglob('*.egg-info')]"
      - name: Pytest (fast)
        run: |
          python -m pytest -m "not integration and not slow"

  pytest_windows_push:
    if: github.event_name == 'push'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[test]"
      - name: Clean build artifacts
        run: python -c "import shutil, pathlib; [shutil.rmtree(p) for p in pathlib.Path('src').rglob('*.egg-info')]"
      - name: Pytest (full)
        run: |
          python -m pytest

  pytest_ubuntu:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[test]"
      - name: Clean build artifacts
        run: python -c "import shutil, pathlib; [shutil.rmtree(p) for p in pathlib.Path('src').rglob('*.egg-info')]"
      - name: Pytest
        run: |
          python -m pytest -m "not integration and not slow and not windows_only"

  coverage:
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[test]"
      - name: Clean build artifacts
        run: python -c "import shutil, pathlib; [shutil.rmtree(p) for p in pathlib.Path('src').rglob('*.egg-info')]"
      - name: Coverage
        run: |
          python -m pytest -m "not integration and not slow" --cov=docwen --cov-report=xml --cov-report=html --cov-fail-under=35
      - name: Upload coverage.xml
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
      - name: Upload htmlcov
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov
